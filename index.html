<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Facilitá - Catálogo de Produtos</title>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

    <!-- Cabeçalho Principal -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo" id="btnLogo">
                <img src="img/logo.png" alt="Facilitá Atacado" style="height: 36px; width: auto; object-fit: contain; display: block;">
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link active">Vitrine</a>
                <a href="admin.html" class="nav-link" title="Painel Administrativo" style="display: inline-flex; align-items: center; justify-content: center; padding: 0.5rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-left: -9px; margin-top: 8px; background: inherit; border-radius: 50%; padding: 0.5px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </a>
            </nav>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main>
        <!-- Barra de Busca e Filtros -->
        <section class="filters-bar">
            <!-- Barra de Busca com ícone de Lupa -->
            <div class="search-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="Pesquisar por descrição, código ou referência...">
            </div>

            <!-- Ordenação -->
            <div class="sort-box">
                <label for="sortSelect">Ordenar por:</label>
                <select id="sortSelect">
                    <option value="none">Padrão</option>
                    <option value="price-asc">Menor Preço</option>
                    <option value="price-desc">Maior Preço</option>
                    <option value="alpha-asc">Nome (A - Z)</option>
                    <option value="alpha-desc">Nome (Z - A)</option>
                </select>
            </div>
        </section>

        <!-- Barra de Categorias -->
        <section id="categoriesBar" class="categories-bar"></section>

        <!-- Grid de Produtos da Vitrine -->
        <section id="productsContainer" class="products-grid">
            <!-- Os produtos serão injetados dinamicamente via JS -->
            <div class="empty-state">
                <p>Carregando catálogo...</p>
            </div>
        </section>
    </main>

    <!-- Modal de Detalhes do Produto -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="closeModalBtn" aria-label="Fechar Modal">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modalImage" src="" alt="Imagem do Produto">
                </div>
                <div class="modal-details">
                    <div class="modal-header">
                        <div class="modal-code-ref">
                            <span id="modalCode">CÓDIGO</span>
                            <span id="modalRef">REFERÊNCIA</span>
                        </div>
                        <h2 id="modalTitle" class="modal-title">Título do Produto</h2>
                    </div>
                    
                    <h3 class="modal-desc-title">Descrição</h3>
                    <p id="modalDescription" class="modal-desc">
                        Detalhamento completo do produto com todas as especificações fornecidas no cadastro da loja.
                    </p>
                    
                    <div class="modal-price-container">
                        <span class="modal-price-label">Preço</span>
                        <span id="modalPrice" class="modal-price-value">R$ 0,00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Rodapé -->
    <footer class="site-footer">
        <p>&copy; 2026 Facilitá Atacado. Todos os direitos reservados. | Por: <a href="https://wa.me/5548996446192" target="_blank" style="color: inherit; text-decoration: underline;">Oitobits Informática</a></p>
    </footer>

    <!-- Scripts de Integração -->
    <!-- Firebase SDK (Versões Compatíveis com carregamento local via file://) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="js/config.js"></script>
    <script src="js/db.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
</body>
</html>
